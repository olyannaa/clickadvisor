case_id: tpch_q15
source: tpch
sql: "CREATE VIEW revenue_q15 AS\nSELECT\n    l_suppkey AS supplier_no,\n    sum(l_extendedprice * (1 - l_discount)) AS total_revenue\nFROM\n    lineitem\nWHERE\n    l_shipdate >= toDate('1996-01-01')\n    AND l_shipdate < toDate('1996-01-01') + INTERVAL 3 MONTH\nGROUP BY\n    l_suppkey;\n\nSELECT\n    s_suppkey,\n    s_name,\n    s_address,\n    s_phone,\n    total_revenue\nFROM\n    supplier,\n    revenue_q15\nWHERE\n    s_suppkey = supplier_no\n    AND total_revenue = (\n        SELECT\n            max(total_revenue)\n        FROM\n            revenue_q15\n    )\nORDER BY\n    s_suppkey;\n\nDROP VIEW IF EXISTS revenue_q15;"

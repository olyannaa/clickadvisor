case_id: tpch_q22
source: tpch
sql: "SELECT\n    cntrycode,\n    count(*) AS numcust,\n    sum(c_acctbal) AS totacctbal\nFROM\n    (\n        SELECT\n            substring(c_phone, 1, 2) AS cntrycode,\n            c_acctbal\n        FROM\n            customer\n        WHERE\n            substring(c_phone, 1, 2) IN ('13', '31', '23', '29', '30', '18', '17')\n            AND c_acctbal > (\n                SELECT\n                    avg(c_acctbal)\n                FROM\n                    customer\n                WHERE\n                    c_acctbal > 0.00\n                    AND substring(c_phone, 1, 2) IN ('13', '31', '23', '29', '30', '18', '17')\n            )\n            AND NOT exists (\n                SELECT\n                    *\n                FROM\n                    orders\n                WHERE\n                    o_custkey = c_custkey\n            )\n    ) AS custsale\nGROUP BY\n    cntrycode\nORDER BY\n    cntrycode;"

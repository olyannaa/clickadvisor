case_id: tpch_q12
source: tpch
sql: "SELECT\n    l_shipmode,\n    sum(CASE\n        WHEN o_orderpriority = '1-URGENT' OR o_orderpriority = '2-HIGH' THEN 1\n        ELSE 0\n    END) AS high_line_count,\n    sum(CASE\n        WHEN o_orderpriority <> '1-URGENT' AND o_orderpriority <> '2-HIGH' THEN 1\n        ELSE 0\n    END) AS low_line_count\nFROM\n    orders,\n    lineitem\nWHERE\n    o_orderkey = l_orderkey\n    AND l_shipmode IN ('MAIL', 'SHIP')\n    AND l_commitdate < l_receiptdate\n    AND l_shipdate < l_commitdate\n    AND l_receiptdate >= toDate('1994-01-01')\n    AND l_receiptdate < toDate('1994-01-01') + INTERVAL 1 YEAR\nGROUP BY\n    l_shipmode\nORDER BY\n    l_shipmode;"

id: R-050
name: toyyyymm_comparison_to_range
tier: 1A
category: sargable
status: proposed
statement: 'toYYYYMM(col) >= YYYYMM или toYYYYMM(col) > YYYYMM оборачивают колонку
  в функцию, запрещая использование sparse primary index. Прямое сравнение col с
  DateTime-константой первого числа месяца восстанавливает sargability. Дополняет
  R-006 для операторов >= и >.'
preconditions:
  syntactic:
  - WHERE содержит toYYYYMM(col) OP YYYYMM_literal где OP in (>=, >, <=, <)
  semantic: []
  data: []
  user: []
proof: 'toYYYYMM(dt) >= YYYYMM ≡ dt >= toDateTime(''YYYY-MM-01 00:00:00'').
  Арифметическое тождество на временной оси.'
explain_template: 'toYYYYMM({col}) {op} {yyyymm} оборачивает колонку в функцию.
  Замените на прямое сравнение {col} с DateTime-константой.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: "SELECT * FROM events WHERE toYYYYMM(ts) >= 202401"
example_after: "SELECT * FROM events WHERE ts >= '2024-01-01 00:00:00'"
expected_speedup:
  estimate: '10-1000x для selective queries'
  measurement_method: 'EXPLAIN indexes=1 сравнение Granules processed.'
risks: []
opt_in: false
references:
- https://clickhouse.com/docs/sql-reference/functions/date-time-functions
- https://clickhouse.com/docs/best-practices/choosing-a-primary-key

id: D-020
name: partition_by_non_date_column
tier: detector
category: schema_design
status: proposed
statement: 'PARTITION BY применён к необработанному столбцу (не к date-функции
  вроде toYYYYMM/toStartOfMonth). Если столбец имеет высокую кардинальность,
  каждое уникальное значение создаёт отдельную партицию — это ведёт к Part
  Explosion (слишком много parts), деградации INSERT и MergeTree-мержей.'
preconditions:
  syntactic:
  - DDL содержит CREATE TABLE с PARTITION BY
  - PARTITION BY не содержит явную date-функцию (toYYYYMM, toStartOfMonth,
    toYear, toStartOfYear, toStartOfQuarter, toDate, toStartOfWeek)
  semantic: []
  data: []
proof:
  status: advisory
  notes: 'Документировано в ClickHouse docs: partitioning is primarily a data
    management technique. High-cardinality PARTITION BY causes part explosion,
    degrading insert performance and merge operations.'
recommendation_template: 'PARTITION BY {partition_expr} использует необработанный
  столбец или выражение без date-функции. Если кардинальность {partition_expr}
  высокая (тысячи уникальных значений), это приведёт к слишком большому числу
  партиций. Рекомендуется использовать date-функцию (toYYYYMM, toStartOfMonth)
  или убедиться, что кардинальность партиционирования не превышает нескольких
  сотен уникальных значений.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: "CREATE TABLE events (\n  user_id UInt64,\n  event_type String,\n\
  \  ts DateTime\n) ENGINE = MergeTree PARTITION BY user_id ORDER BY (user_id, ts)"
example_after: "CREATE TABLE events (\n  user_id UInt64,\n  event_type String,\n\
  \  ts DateTime\n) ENGINE = MergeTree PARTITION BY toYYYYMM(ts) ORDER BY (user_id,\
  \ ts)"
expected_speedup:
  estimate: null
  measurement_method: null
risks:
- Низкокардинальные столбцы (тип, страна) могут быть корректными ключами партиционирования
severity: medium
opt_in: false
references:
- https://clickhouse.com/docs/best-practices/choosing-a-partitioning-key
- https://clickhouse.com/blog/ai-generated-clickhouse-schemas-mistakes-and-advice

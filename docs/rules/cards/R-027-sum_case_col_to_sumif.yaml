id: R-027
name: sum_case_col_to_sumif
tier: 1A
category: aggregate_rewrite
status: proposed
statement: 'SUM(CASE WHEN cond THEN col ELSE 0 END) семантически эквивалентно
  sumIf(col, cond). sumIf — встроенный комбинатор ClickHouse, не требует
  материализации CASE-выражения в промежуточный столбец.'
preconditions:
  syntactic:
  - Запрос содержит SUM(CASE WHEN ... THEN <column_or_expr> ELSE 0 END)
  semantic:
  - ELSE-ветка возвращает 0 (или эквивалент нуля)
  data: []
  user: []
proof: 'sumIf(col, cond) применяет сложение только к строкам, где cond=true,
  эквивалентно SUM(CASE WHEN cond THEN col ELSE 0 END). При ELSE 0 результаты
  математически идентичны, так как 0 нейтрален в сложении.'
explain_template: 'SUM(CASE WHEN {cond} THEN {col} ELSE 0 END) заменяется
  sumIf({col}, {cond}). Это устраняет промежуточное CASE-вычисление и делает
  код более читаемым.'
ch_version:
  introduced: '1.23'
  deprecated: null
  last_validated: '25.3'
example_before: "SELECT\n  SUM(CASE WHEN is_paid THEN amount ELSE 0 END) AS paid_total\n\
  FROM orders"
example_after: "SELECT\n  sumIf(amount, is_paid) AS paid_total\nFROM orders"
expected_speedup:
  estimate: '5-10% на больших наборах данных'
  measurement_method: 'Сравнение elapsed в system.query_log.'
risks:
- Если ELSE-ветка не 0 (например, ELSE -1), замена нарушает семантику
opt_in: false
references:
- https://clickhouse.com/docs/sql-reference/aggregate-functions/combinators

id: R-025
name: order_by_tuple_no_pk
tier: 1B
category: schema_design
status: proposed
statement: 'CREATE TABLE с явным ORDER BY tuple() означает отсутствие первичного
  ключа. Без primary key каждый SELECT выполняет полный скан таблицы — sparse
  index недоступен. Для аналитических запросов с фильтрацией это ведёт к
  многократно избыточному чтению с диска.'
preconditions:
  syntactic:
  - DDL содержит CREATE TABLE
  - DDL содержит ORDER BY tuple()
  semantic: []
  data: []
  user:
  - Требуется анализ паттернов запросов для выбора правильного ORDER BY
proof: 'ClickHouse хранит данные, отсортированные по ORDER BY-ключу, и строит
  sparse primary index по этому ключу. ORDER BY tuple() отключает сортировку
  и sparse index, гарантируя полный скан при каждом SELECT с WHERE.'
explain_template: 'Таблица создаётся без первичного ключа (ORDER BY tuple()).
  Каждый SELECT будет сканировать все данные. Выберите ORDER BY по колонкам,
  наиболее часто используемым в WHERE-условиях, например ORDER BY (user_id,
  event_date).'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: "CREATE TABLE events (\n  user_id UInt64,\n  event_type String,\n\
  \  ts DateTime\n) ENGINE = MergeTree ORDER BY tuple()"
example_after: "CREATE TABLE events (\n  user_id UInt64,\n  event_type String,\n\
  \  ts DateTime\n) ENGINE = MergeTree ORDER BY (user_id, ts)"
expected_speedup:
  estimate: '10-1000x для selective queries'
  measurement_method: 'Сравнение read_rows в system.query_log до и после добавления ORDER BY.'
risks:
- Изменение ORDER BY требует пересоздания и перезаливки таблицы
- Неправильный выбор ORDER BY может замедлить INSERT (сортировка данных при вставке)
opt_in: true
references:
- https://clickhouse.com/docs/best-practices/choosing-a-primary-key
- https://clickhouse.com/docs/blog/ai-generated-clickhouse-schemas-mistakes-and-advice

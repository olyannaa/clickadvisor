id: R-022
name: float_monetary_column_to_decimal
tier: 1B
category: schema_types
status: proposed
statement: 'Колонка объявлена как Float32 или Float64, но имя указывает на
  монетарное значение (amount, price, cost, revenue, fee, total, balance, tax).
  Float-арифметика не ассоциативна и даёт неточные результаты для денежных сумм.
  Рекомендуется Decimal(p, s).'
preconditions:
  syntactic:
  - DDL содержит CREATE TABLE
  - Колонка объявлена с типом Float32 или Float64
  - Имя колонки содержит паттерн монетарного домена
  semantic: []
  data: []
  user:
  - Проверить реальный диапазон и нужную точность перед заменой
proof: 'Float-арифметика не ассоциативна: (a + b) - a != b при больших разницах
  в порядке. Для финансовых данных это недопустимо. Decimal(p, s) даёт точные
  целочисленные вычисления со смещённой точкой.'
explain_template: 'Колонка {column} объявлена как {col_type}, но по имени
  предположительно хранит денежные значения. Float не подходит для финансовых
  расчётов из-за ошибок округления. Используйте Decimal32(2) для сумм до ~21M
  или Decimal64(2) для больших значений.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: "CREATE TABLE orders (\n  order_id UInt64,\n  total_amount Float64,\n\
  \  tax_amount Float64\n) ENGINE = MergeTree ORDER BY order_id"
example_after: "CREATE TABLE orders (\n  order_id UInt64,\n  total_amount Decimal64(2),\n\
  \  tax_amount Decimal64(2)\n) ENGINE = MergeTree ORDER BY order_id"
expected_speedup:
  estimate: null
  measurement_method: 'Сравнение точности агрегации SUM() по Float64 и Decimal64(2)
    на реальных данных.'
risks:
- Decimal ограничен по диапазону (Decimal32 до ~21M, Decimal64 до ~9.2 * 10^16)
- Decimal не поддерживает NaN и Infinity
- Конвертация требует перезаливки данных
opt_in: true
references:
- https://kb.altinity.com/altinity-kb-schema-design/floats-vs-decimals/
- https://clickhouse.com/docs/best-practices/select-data-types

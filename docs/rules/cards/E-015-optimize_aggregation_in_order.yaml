id: E-015
name: optimize_aggregation_in_order
tier: env
category: aggregation_settings
status: proposed
statement: 'optimize_aggregation_in_order = 1 позволяет ClickHouse использовать
  порядок сортировки таблицы для потоковой агрегации без полного накопления
  в памяти, если GROUP BY ключ — это префикс ORDER BY ключа таблицы. Снижает
  memory footprint агрегации.'

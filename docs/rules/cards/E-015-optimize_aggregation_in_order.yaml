    и текущих settings.'
risks:
- В некоторых случаях (неоднородная кардинальность ключей) может замедлить запрос
opt_in: false
references:
- https://clickhouse.com/docs/operations/settings/settings#optimize_aggregation_in_order
- https://clickhouse.com/docs/sql-reference/statements/select/group-by
hardware_preconditions: []
config_preconditions:
- GROUP BY содержит prefix ORDER BY ключа таблицы
workload_preconditions:
- Агрегационные запросы потребляют значительный объём RAM
recommendation:
  setting: optimize_aggregation_in_order
  current_value_check: 'SELECT value FROM system.settings WHERE name = ''optimize_aggregation_in_order'''
  recommended_formula: 'optimize_aggregation_in_order = 1 когда GROUP BY ключи
    совпадают с prefix ORDER BY таблицы. Default = 0.'
  example: 'SET optimize_aggregation_in_order = 1;'
reasoning: 'Потоковая агрегация по ORDER BY-совместимому ключу позволяет
  ClickHouse финализировать и отправить частичные результаты сразу, снижая
  peak memory usage и улучшая latency.'
condition: 'GROUP BY key prefix == ORDER BY key prefix'

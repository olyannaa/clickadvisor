id: R-029
name: lower_col_like_to_ilike
tier: 1A
category: function_rewrite
status: proposed
statement: 'lower(col) LIKE pattern семантически эквивалентен col ILIKE pattern.
  ILIKE — нативный оператор ClickHouse (с версии 22.6), который выполняет
  регистронезависимое сравнение без явного вызова lower(), что упрощает
  код и потенциально позволяет оптимизатору использовать skip-индексы.'
preconditions:
  syntactic:
  - Запрос содержит lower(col) LIKE pattern
  semantic: []
  data: []
  user: []
proof: 'ILIKE(col, pat) в ClickHouse применяет lower() к обоим операндам перед
  сравнением, поэтому lower(col) LIKE lower_pat === col ILIKE pat для ASCII-символов.
  Паттерн lower(col) LIKE требует двух операций (вызов lower + LIKE), ILIKE — одной.'
explain_template: 'lower({col}) LIKE ''{pattern}'' заменяется {col} ILIKE ''{pattern}''.
  Оба выражения регистронезависимы. ILIKE — нативный оператор, не требующий
  явной конвертации к lowercase.'
ch_version:
  introduced: '22.6'
  deprecated: null
  last_validated: '25.3'
example_before: "SELECT * FROM logs WHERE lower(message) LIKE '%error%'"
example_after: "SELECT * FROM logs WHERE message ILIKE '%error%'"
expected_speedup:
  estimate: null
  measurement_method: 'Упрощение плана запроса; реальное ускорение зависит от наличия text-индекса.'
risks:
- ILIKE доступен только начиная с CH 22.6
- Для non-ASCII символов поведение lower() и ILIKE может различаться в зависимости от locale
opt_in: false
references:
- https://clickhouse.com/docs/sql-reference/functions/string-search-functions

id: D-015
name: optimize_table_final
tier: detector
category: ddl_operations
status: proposed
statement: 'OPTIMIZE TABLE ... FINAL принудительно сливает все data parts в один,
  игнорируя лимит max_bytes_to_merge_at_max_space_in_pool. На больших таблицах
  ведёт к многочасовой I/O нагрузке, возможному OOM и созданию частей в сотни ГБ,
  которые невозможно разбить обратно.'
preconditions:
  syntactic:
  - Запрос содержит OPTIMIZE TABLE ... FINAL
  semantic: []
  data: []
proof:
  status: advisory
  notes: 'Документировано в ClickHouse docs: OPTIMIZE FINAL игнорирует стандартные
    лимиты слияния. Altinity KB: не рекомендуется для таблиц с более 10 млн строк.'
recommendation_template: 'OPTIMIZE TABLE ... FINAL обнаружен в SQL. Эта операция
  перезаписывает все data parts в один, игнорируя max_bytes_to_merge_at_max_space_in_pool.
  На больших таблицах это многочасовая I/O нагрузка и риск OOM. Используйте вместо
  этого FINAL-квалификатор в SELECT: SELECT ... FROM t FINAL — он гарантирует
  дедупликацию при чтении без принудительного слияния.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: 'OPTIMIZE TABLE events FINAL'
example_after: 'SELECT event_id, user_id FROM events FINAL WHERE dt >= today() - 7'
expected_speedup:
  estimate: null
  measurement_method: null
risks:
- После выполнения OPTIMIZE FINAL последствия необратимы без ручного разбиения части
- Создание части в сотни ГБ делает будущие мутации и ALTER крайне медленными
severity: high
opt_in: false
references:
- https://clickhouse.com/docs/best-practices/avoid-optimize-final
- https://kb.altinity.com/altinity-kb-queries-and-syntax/altinity-kb-optimize-vs-optimize-final/

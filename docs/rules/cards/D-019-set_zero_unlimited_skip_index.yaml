id: D-019
name: set_zero_unlimited_skip_index
tier: detector
category: skip_index
status: proposed
statement: 'DDL содержит skip index типа set(0). Значение 0 означает неограниченный
  набор значений на блок — индекс будет накапливать все уникальные значения
  в грануле без ограничения. На высококардинальных колонках это ведёт к огромному
  потреблению памяти при слияниях и нулевому эффекту пропуска блоков.'
preconditions:
  syntactic:
  - DDL содержит INDEX ... TYPE set(0)
  semantic: []
  data: []
proof:
  status: advisory
  notes: 'Документировано в ClickHouse docs: set(N) tracks a set of values up
    to N per block. N=0 означает неограниченный размер — эффективен только
    для колонок с гарантированно малым числом уникальных значений в грануле.'
recommendation_template: 'Skip index {index_name} использует TYPE set(0) —
  неограниченный размер набора. Если колонка имеет высокую кардинальность
  в пределах гранулы, индекс не сможет пропускать блоки и только замедлит
  слияния. Используйте set(N) с явным ограничением (например, set(100))
  или выберите другой тип индекса (minmax, bloom_filter).'
ch_version:
  introduced: '0.720'
  deprecated: null
  last_validated: '25.3'
example_before: "INDEX idx_status status TYPE set(0) GRANULARITY 4"
example_after: "INDEX idx_status status TYPE set(100) GRANULARITY 4"
expected_speedup:
  estimate: null
  measurement_method: null
risks:
- Если колонка имеет низкую кардинальность, set(0) работает корректно
severity: low
opt_in: false
references:
- https://clickhouse.com/docs/best-practices/use-data-skipping-indices-where-appropriate
- https://clickhouse.com/docs/optimize/skipping-indexes

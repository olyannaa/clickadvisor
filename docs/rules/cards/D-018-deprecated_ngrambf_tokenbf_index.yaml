id: D-018
name: deprecated_ngrambf_tokenbf_index
tier: detector
category: skip_index
status: proposed
statement: 'DDL содержит skip index типа ngrambf_v1 или tokenbf_v1. Оба типа
  устарели начиная с ClickHouse 26.2 и заменены более эффективным text-индексом
  (инвертированный индекс).'
preconditions:
  syntactic:
  - DDL содержит INDEX ... TYPE ngrambf_v1 или INDEX ... TYPE tokenbf_v1
  semantic: []
  data: []
proof:
  status: advisory
  notes: 'Документировано в ClickHouse docs (use-data-skipping-indices): tokenbf_v1
    и ngrambf_v1 deprecated в CH >= 26.2 в пользу text indexes.'
recommendation_template: 'Skip index {index_name} использует тип {index_type},
  который устарел в CH >= 26.2. Замените на TEXT-индекс: INDEX {index_name}
  {column} TYPE text GRANULARITY 1. Text-индекс детерминирован, поддерживает
  многотерминный поиск и не требует настройки размера токенов.'
ch_version:
  introduced: '0.720'
  deprecated: '26.2'
  last_validated: '25.3'
example_before: "INDEX idx_log message TYPE ngrambf_v1(4, 1024, 2, 0) GRANULARITY\
  \ 4"
example_after: "INDEX idx_log message TYPE text GRANULARITY 1"
expected_speedup:
  estimate: null
  measurement_method: null
risks:
- text-индекс требует CH >= 24.1; в старых версиях недоступен
severity: medium
opt_in: false
references:
- https://clickhouse.com/docs/best-practices/use-data-skipping-indices-where-appropriate
- https://clickhouse.com/docs/optimize/skipping-indexes

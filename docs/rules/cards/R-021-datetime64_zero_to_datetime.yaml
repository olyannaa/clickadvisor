id: R-021
name: datetime64_zero_to_datetime
tier: 1A
category: schema_types
status: proposed
statement: 'Колонка объявлена как DateTime64(0), что семантически эквивалентно
  DateTime — оба хранят время с точностью до секунды. DateTime занимает 4 байта
  (UInt32 epoch), DateTime64(0) — 8 байт (Int64). Замена сокращает хранение вдвое
  для этой колонки.'
preconditions:
  syntactic:
  - DDL содержит CREATE TABLE
  - Колонка объявлена с типом DateTime64(0) или DateTime64(0, timezone)
  semantic: []
  data: []
  user: []
proof: 'DateTime64(0) хранит эпох-секунды как Int64 (8 байт). DateTime хранит
  эпох-секунды как UInt32 (4 байта). При precision=0 семантика полностью совпадает
  в диапазоне дат DateTime (1970-2106). Разница только в диапазоне: DateTime64
  поддерживает более широкий диапазон дат.'
explain_template: 'Колонка {column} объявлена как DateTime64(0), что идентично
  DateTime по точности. DateTime занимает вдвое меньше памяти (4 байта vs 8 байт).
  Замените тип на DateTime для экономии хранилища и улучшения производительности
  GROUP BY и сортировки.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: "CREATE TABLE events (\n  ts DateTime64(0),\n  user_id UInt64\n)\
  \ ENGINE = MergeTree ORDER BY ts"
example_after: "CREATE TABLE events (\n  ts DateTime,\n  user_id UInt64\n) ENGINE\
  \ = MergeTree ORDER BY ts"
expected_speedup:
  estimate: '~50% compression для колонки timestamp'
  measurement_method: 'Сравнение compressed_bytes по колонке в system.parts_columns
    до и после замены типа.'
risks:
- DateTime поддерживает диапазон 1970-01-01 — 2106-02-07; DateTime64(0) шире
- При репликации между разными версиями CH возможна несовместимость типов
opt_in: false
references:
- https://clickhouse.com/docs/best-practices/select-data-types
- https://clickhouse.com/docs/sql-reference/data-types/datetime64

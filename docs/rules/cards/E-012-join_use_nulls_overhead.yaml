id: E-012
name: join_use_nulls_overhead
tier: env
category: join_settings
status: proposed
statement: 'join_use_nulls = 1 оборачивает результирующие колонки внешних
  JOIN (LEFT/RIGHT/FULL) в Nullable, добавляя дополнительный UInt8-столбец маски
  и overhead при обработке. Значение по умолчанию join_use_nulls = 0 использует
  default-значения типа вместо NULL, что эффективнее.'
preconditions:
  syntactic: []
  semantic: []
  data: []
proof: ''
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: ''
example_after: ''
expected_speedup:
  estimate: null
  measurement_method: 'N/A — environment rule, effect зависит от workload, hardware
    и текущих settings.'
risks:
- При join_use_nulls=0 внешний JOIN возвращает default value (0/'') вместо NULL — могут нарушиться ожидания клиентов
- Изменение setting влияет на все запросы с LEFT/RIGHT/FULL JOIN в сессии
opt_in: false
references:
- https://clickhouse.com/docs/best-practices/minimize-optimize-joins
hardware_preconditions: []
config_preconditions:
- join_use_nulls = 1 (включён в профиле или сессии)
workload_preconditions:
- Запросы активно используют LEFT/RIGHT/FULL JOIN
recommendation:
  setting: join_use_nulls
  current_value_check: 'SELECT value FROM system.settings WHERE name = ''join_use_nulls'''
  recommended_formula: 'join_use_nulls = 0 (default). Использовать join_use_nulls=1
    только при необходимости соответствия ANSI NULL-семантике в outer join.'
  example: 'SET join_use_nulls = 0;'
reasoning: 'join_use_nulls=1 оборачивает колонки результата в Nullable<T>,
  добавляя дополнительный файл маски null и overhead при ANY-операциях.
  join_use_nulls=0 использует default-значение (0 для числовых, пустую строку
  для String), что устраняет Nullable-overhead.'
condition: ''

id: E-019
name: prefer_localhost_replica
tier: env
category: distributed_settings
status: proposed
statement: 'prefer_localhost_replica = 1 (default) заставляет ClickHouse читать
  с локальной реплики, если она есть. Это снижает сетевой трафик и задержку.
  Если отключено, ClickHouse может читать с удалённой реплики даже при наличии
  локальной.'

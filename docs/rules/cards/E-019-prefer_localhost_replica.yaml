recommendation:
  setting: prefer_localhost_replica
  current_value_check: 'SELECT value FROM system.settings WHERE name = ''prefer_localhost_replica'''
  recommended_formula: 'prefer_localhost_replica = 1 (default). Отключать только
    если нужно балансировать нагрузку между репликами или локальная реплика сильно
    отстаёт.'
  example: 'SET prefer_localhost_replica = 1;  -- default, обычно не нужно менять'
reasoning: 'Чтение с локальной реплики устраняет сетевой round-trip, уменьшает
  latency и снижает сетевой трафик между нодами кластера.'
condition: 'Distributed queries с несколькими репликами'

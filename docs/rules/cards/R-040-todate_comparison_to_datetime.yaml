id: R-040
name: todate_comparison_to_datetime
tier: 1A
category: sargable
status: proposed
statement: 'toDate(datetime_col) >= date / > date / <= date / < date — применение
  toDate() к колонке делает predicate не-sargable для DateTime primary key.
  Прямое сравнение datetime_col с конвертированной DateTime-константой позволяет
  использовать sparse primary index. Дополняет R-005 для операторов сравнения.'
preconditions:
  syntactic:
  - WHERE содержит toDate(col) OP literal где OP in (>=, >, <=, <)
  semantic:
  - Тип колонки — DateTime или DateTime64
  data: []
  user: []
proof: 'toDate(dt) >= D ≡ dt >= toDateTime(D) (полночь D).
  toDate(dt) > D ≡ dt >= toDateTime(D+1day).
  toDate(dt) < D ≡ dt < toDateTime(D).
  toDate(dt) <= D ≡ dt < toDateTime(D+1day).
  Всё это арифметические тождества на временной оси.'
explain_template: 'toDate({col}) {op} ''{date}'' оборачивает колонку в функцию,
  из-за чего ClickHouse не может использовать sparse primary index.
  Замените на прямое сравнение {col} с DateTime-константой.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: 'SELECT * FROM events WHERE toDate(ts) >= ''2024-01-01'''
example_after: 'SELECT * FROM events WHERE ts >= ''2024-01-01 00:00:00'''
expected_speedup:
  estimate: '10-1000x для selective queries'
  measurement_method: 'Сравнение Granules processed в EXPLAIN indexes=1.'
risks: []
opt_in: false
references:
- https://clickhouse.com/docs/sql-reference/functions/date-time-functions
- https://clickhouse.com/docs/best-practices/choosing-a-primary-key

id: D-017
name: nullable_column_in_ddl
tier: detector
category: schema_types
status: proposed
statement: 'CREATE TABLE содержит колонку типа Nullable(T). Nullable создаёт
  отдельный файл UInt8-маски для трекинга NULL-значений, что увеличивает хранение
  и почти всегда снижает производительность.'
preconditions:
  syntactic:
  - DDL содержит CREATE TABLE
  - В определении колонки присутствует тип Nullable(...)
  semantic: []
  data: []
proof:
  status: advisory
  notes: 'Документировано в ClickHouse docs: Nullable column consumes additional
    storage space и almost always negatively affects performance. Nullable type
    field cannot be included in table indexes.'
recommendation_template: 'Колонка {column} объявлена как Nullable({inner_type}).
  Nullable создаёт дополнительный файл UInt8-маски. Если NULL не несёт семантической
  нагрузки (отсутствие значения), рассмотрите замену на {inner_type} DEFAULT 0
  или {inner_type} DEFAULT ''''.'
ch_version:
  introduced: '1.0'
  deprecated: null
  last_validated: '25.3'
example_before: "CREATE TABLE events (user_id UInt64, score Nullable(Float64))\n\
  ENGINE = MergeTree ORDER BY user_id"
example_after: "CREATE TABLE events (user_id UInt64, score Float64 DEFAULT 0.0)\n\
  ENGINE = MergeTree ORDER BY user_id"
expected_speedup:
  estimate: '5-15%'
  measurement_method: 'Сравнение времени выполнения SELECT с агрегациями по Nullable
    и не-Nullable колонкам.'
risks:
- Если NULL семантически значим (отличается от «нет данных» и нуля), замена нарушит логику
severity: medium
opt_in: false
references:
- https://clickhouse.com/docs/optimize/avoid-nullable-columns
- https://clickhouse.com/docs/sql-reference/data-types/nullable

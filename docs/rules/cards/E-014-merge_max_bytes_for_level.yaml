id: E-014
name: merge_max_bytes_for_level
tier: env
category: merge_settings
status: proposed
statement: 'max_bytes_to_merge_at_max_space_in_pool (default ~150GB) определяет
  максимальный размер одного слияния при достаточном свободном месте. При
  объектном хранилище (S3/GCS) это значение может быть ограничено пропускной
  способностью сети; при локальных NVMe его можно увеличить.'
preconditions:
  syntactic: []
  semantic: []
  data: []
proof: ''
ch_version:
  introduced: '10.1016'
  deprecated: null
  last_validated: '25.3'
example_before: ''
example_after: ''
expected_speedup:
  estimate: null
  measurement_method: 'N/A — environment rule, effect зависит от workload, hardware
    и текущих settings.'
risks:
- Увеличение лимита ускоряет конвергенцию к меньшему числу parts, но требует больше RAM и CPU на слияние
- Не влияет на OPTIMIZE FINAL (который игнорирует этот лимит)
opt_in: false
references:
- https://clickhouse.com/docs/operations/settings/merge-tree-settings
hardware_preconditions:
- Объём свободного дискового пространства > 2x от max_bytes_to_merge_at_max_space_in_pool
config_preconditions: []
workload_preconditions:
- Высокая скорость ingestion приводит к накоплению мелких parts
recommendation:
  setting: max_bytes_to_merge_at_max_space_in_pool
  current_value_check: 'SELECT value FROM system.merge_tree_settings WHERE name =
    ''max_bytes_to_merge_at_max_space_in_pool'''
  recommended_formula: '150GB (default) для большинства случаев. До 300-500GB
    для локального NVMe при высоком write-throughput.'
  example: "-- В SETTINGS CREATE TABLE или в merge_tree секции config.xml:\nmax_bytes_to_merge_at_max_space_in_pool\
    \ = 161061273600  -- 150 GiB default"
reasoning: 'Большие слияния сокращают number of parts быстрее, что улучшает
  производительность SELECT. Ограничено пропускной способностью I/O: на SSD
  лимит можно поднять, на S3 — лучше оставить стандартным.'
condition: 'system.parts_columns WHERE active = 1 AND bytes > 10GB'

id: R-004
name: count_star_in_distinct_subquery_collapse
tier: 1A
category: aggregation_specialization
status: proposed
statement: 'Свернуть SELECT COUNT(*) FROM (SELECT DISTINCT x FROM t) в

  SELECT uniqExact(x) FROM t.'
preconditions:
  syntactic:
  - Внешний SELECT — COUNT(*)
  - Внутренний — SELECT DISTINCT по одному выражению
  - Нет LIMIT, нет ORDER BY с зависимостью от результата
  semantic: []
  data: []
proof: 'По реляционной алгебре: |π_x(R)| = |{r.x : r ∈ R}|.

  Это определение uniqExact. Двухпроходный план (distinct→count)

  семантически равен однопроходному.'
explain_template: Конструкция SELECT COUNT(*) FROM (SELECT DISTINCT x ...) заставляет движок сначала материализовать distinct-результат, а потом отдельно его посчитать. Для ClickHouse это та же логическая задача, что и подсчитать число уникальных значений сразу. Специализированный агрегат делает это в одном потоке вместо двух логических фаз.
ch_version:
  introduced: '20.1'
  deprecated: null
  last_validated: '25.3'
example_before: SELECT COUNT(*) FROM (SELECT DISTINCT user_id FROM events)
example_after: SELECT uniqExact(user_id) FROM events
expected_speedup:
  estimate: 1.5-3×
  measurement_method: Прогон на TPC-H lineitem (6M rows). Сравнение query_duration_ms из system.query_log до и после применения правила.
risks: []
opt_in: false
references: []
